version: '3.8'

services:
  # ============ Kafka 3.7（KRaft 模式，无 Zookeeper）============
  kafka:
    image: bitnami/kafka:3.7
    container_name: cs-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft 模式
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # 性能调优
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_NUM_PARTITIONS: "3"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_MIN_INSYNC_REPLICAS: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"  # 7 天
      KAFKA_CFG_LOG_SEGMENT_BYTES: "1073741824"  # 1 GB
      KAFKA_KRAFT_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      # 内存
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1G"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - cs-net

  # ============ Kafka UI（可视化）============
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cs-kafka-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "onlinechat"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      - kafka
    networks:
      - cs-net

  # ============ MySQL 8 ============
  mysql:
    image: mysql:8.4.0
    container_name: cs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cs_chat}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./deploy/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=500
      - --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cs-net

  # ============ Redis 7 ============
  redis:
    image: redis:7.2-alpine
    container_name: cs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cs-net

  # ============ Nacos 2.3 ============
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: cs-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      SPRING_DATASOURCE_PLATFORM: mysql
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-SecretKey012345678901234567890123456789012345678901234567890123456789}
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cs-net

  # ============ 微服务 ============
  cs-auth:
    build:
      context: .
      dockerfile: deploy/docker/cs-auth.Dockerfile
    container_name: cs-auth
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DB: cs_auth
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "9001:9001"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - cs-net

  cs-im:
    build:
      context: .
      dockerfile: deploy/docker/cs-im.Dockerfile
    container_name: cs-im
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DB: cs_im
      NACOS_ADDR: nacos:8848
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "9003:9003"
    volumes:
      - upload-data:/app/data/upload
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - cs-net

  cs-gateway:
    build:
      context: .
      dockerfile: deploy/docker/cs-gateway.Dockerfile
    container_name: cs-gateway
    restart: unless-stopped
    environment:
      NACOS_ADDR: nacos:8848
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "9000:9000"
    depends_on:
      - nacos
      - cs-auth
      - cs-im
    networks:
      - cs-net

  # ============ cs-message（Kafka 消费者 + 离线消息）============
  cs-message:
    build:
      context: .
      dockerfile: deploy/docker/cs-message.Dockerfile
    container_name: cs-message
    restart: unless-stopped
    environment:
      NACOS_ADDR: nacos:8848
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP: kafka:9092
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "9005:9005"
    depends_on:
      - nacos
      - kafka
      - redis
    networks:
      - cs-net

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
  upload-data:
  kafka-data:

networks:
  cs-net:
    driver: bridge