server:
  port: 9001
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  profiles:
    active: prod
  application:
    name: cs-auth
  # v2.2.50: spring.config.import 简写 (省略 .yaml 后缀)
  config:
    import:
      - "optional:nacos:cs-auth"
      - "optional:nacos:cs-auth-${spring.profiles.active}"
  # nacos 服务发现: 注册到 nacos
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        register-enabled: true
        heartbeat-interval: 5000
        heart-beat-timeout: 15000

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:cs_auth}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      filters: stat,wall,slf4j
      stat-view-servlet:
        enabled: true
        login-username: admin
        login-password: admin123
        url-pattern: /druid/*

  flyway:
    enabled: false   # v2.2.0: cs-auth 不需要 migration 校验，统一走 db_init_all.sql
    baseline-on-migrate: false
    locations: classpath:db/migration

  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    type-aliases-package: com.example.auth.domain
    configuration:
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        id-type: AUTO

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

cs:
  jwt:
    secret: ZLmASTkUGsHRGeHW8i3-Fk1Hw39lEHIK
    ttl-ms: 86400000
  sms:
    mock: false
    ttl-seconds: 300
    length: 6
  phone:
    secret: please-change-this-32byte-aes-secret

oauth:
  github:
    client-id: demo-github-client-id
    client-secret: demo-github-secret
    redirect-uri: https://yourdomain.com/auth/github/callback
    mock: false
  google:
    client-id: demo-google-client-id
    client-secret: demo-google-secret
    redirect-uri: https://yourdomain.com/auth/google/callback
    mock: false

logging:
  level:
    com.example: DEBUG
    org.hibernate.SQL: INFO

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    type: com.zaxxer.hikari.HikariDataSource
  flyway:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    druid:
      filters: stat,wall
      stat-view-servlet:
        enabled: false
wechat:
  oa:
    app-id: ${WX_OA_APP_ID:demo-app-id}
    app-secret: ${WX_OA_APP_SECRET:demo-app-secret}
    mock: ${WX_OA_MOCK:true}                # 默认 Mock 模式（sandbox 无真实 appId）
  work:
    corp-id: ${WX_WORK_CORP_ID:demo-corp-id}
    corp-secret: ${WX_WORK_CORP_SECRET:demo-corp-secret}
    agent-id: ${WX_WORK_AGENT_ID:1000001}
    mock: ${WX_WORK_MOCK:true}
  mini:
    app-id: ${WX_MINI_APP_ID:demo-mini-app-id}
    app-secret: ${WX_MINI_APP_SECRET:demo-mini-app-secret}
    mock: ${WX_MINI_MOCK:true}
