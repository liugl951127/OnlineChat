server:
  port: 9001
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  profiles:
    active: dev
  application:
    name: cs-auth
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:cs_auth}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      filters: stat,wall,slf4j
      stat-view-servlet:
        enabled: true
        login-username: admin
        login-password: admin123
        url-pattern: /druid/*

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    type-aliases-package: com.example.auth.domain
    configuration:
      map-underscore-to-camel-case: true
    global-config:
      db-config:
        id-type: AUTO

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

cs:
  jwt:
    secret: ZLmASTkUGsHRGeHW8i3-Fk1Hw39lEHIK
    ttl-ms: 86400000
  sms:
    mock: true
    ttl-seconds: 300
    length: 6
  phone:
    secret: please-change-this-32byte-aes-secret

oauth:
  github:
    client-id: demo-github-client-id
    client-secret: demo-github-secret
    redirect-uri: https://yourdomain.com/auth/github/callback
    mock: true
  google:
    client-id: demo-google-client-id
    client-secret: demo-google-secret
    redirect-uri: https://yourdomain.com/auth/google/callback
    mock: true

logging:
  level:
    com.example: DEBUG
    org.hibernate.SQL: INFO

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    type: com.zaxxer.hikari.HikariDataSource
  flyway:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    druid:
      filters: stat,wall
      stat-view-servlet:
        enabled: false