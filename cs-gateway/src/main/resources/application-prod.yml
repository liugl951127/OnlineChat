# 生产环境配置（prod profile） (v2.2.61)
#
# 用法：java -jar cs-gateway.jar --spring.profiles.active=prod
#
# 关键差异（vs application.yml）：
#   1. nacos.namespace 默认 prod（隔离生产配置）
#   2. routes 用 lb:// 服务名（通过 nacos discovery 负载均衡）
#   3. Redis pool 增大（生产高并发）
#   4. Tomcat max-threads 调高
#   5. 启用 actuator prometheus + 健康检查详细信息
#   6. JWT secret 必须显式设置（无默认值）
#
# 启动命令：
#   NACOS_USER=admin NACOS_PASSWORD=${MY_SECRET} \
#   JWT_SECRET=${JWT_SECRET} \
#   java -jar cs-gateway.jar --spring.profiles.active=prod

server:
  port: 9000
  compression:
    enabled: true
    mime-types: application/json,text/html
  tomcat:
    max-threads: 400
    accept-count: 200
    max-connections: 8192

spring:
  application:
    name: cs-gateway
  # v2.2.70: prod profile 必须显式声明 spring.config.import
  #  (prod profile 启动时 application-prod.yml 覆盖主配置)
  config:
    import: "optional:nacos:cs-gateway-prod.yaml"
  main:
    # cs-gateway 用 spring-cloud-starter-gateway（WebFlux 响应式）
    web-application-type: reactive

  cloud:
    nacos:
      discovery:
        # 生产必须启用服务发现
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}    # v2.2.61: 修正 NACOS_PASS → NACOS_PASSWORD
        register-enabled: true
        heartbeat-interval: 5000
        heart-beat-timeout: 15000
      # v2.2.60: nacos-config 属性配置（代替 spring.config.import）
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:prod}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}    # v2.2.61: 修正
      # v2.2.61: gateway 路由全部用 lb://（通过 nacos 服务发现 + spring-cloud-loadbalancer）
      gateway:
        routes:
          - id: cs-auth
            uri: lb://cs-auth
            predicates:
              - Path=/auth/**,/auth/actuator/**,/api/auth/**
          - id: cs-robot
            uri: lb://cs-robot
            predicates:
              - Path=/robot/**
          - id: cs-im
            uri: lb://cs-im
            predicates:
              - Path=/im/**,/ws/**,/api/im/**,/api/ws/**
          - id: cs-trade
            uri: lb://cs-trade
            predicates:
              - Path=/trade/**
          - id: cs-message                                       # v2.2.61: 新增 message 路由
            uri: lb://cs-message
            predicates:
              - Path=/message/**,/api/message/**
          # K8s 探针（liveness/readiness/Prometheus）
          - id: auth-health
            uri: lb://cs-auth
            predicates:
              - Path=/actuator/auth/**
            filters:
              - StripPrefix=1
          - id: im-health
            uri: lb://cs-im
            predicates:
              - Path=/actuator/im/**
            filters:
              - StripPrefix=1
          - id: message-health
            uri: lb://cs-message
            predicates:
              - Path=/actuator/message/**,/message/actuator/**
            filters:
              - StripPrefix=1
        # 生产级限流：去除重复的 CORS header
        default-filters:
          - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10

  codec:
    max-in-memory-size: 20MB

cs:
  jwt:
    # v2.2.75: 默认 fallback + 警告 (避免生产启动失败)
    #  生产部署必须显式设 JWT_SECRET 环境变量
    #  默认 secret 仅用于"凭证丢失启动仍能成功"场景
    #  (启用后会启动警告 "JWT_SECRET 使用默认值, 生产不安全")
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_USE_32_BYTE_SECRET}
    ttl-ms: ${JWT_TTL_MS:86400000}

logging:
  level:
    root: INFO
    com.example: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
    org.apache.kafka: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,gatewayroutes
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        gateway.requests: true

info:
  app:
    name: cs-gateway
    version: 1.7.1
    profile: prod