<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>在线客服 · 统一入口</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/shared/design-system.css">
  <style>
    body {
      margin: 0; min-height: 100vh;
      background:
        radial-gradient(circle at 20% 30%, rgba(22,119,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(114,46,209,0.12) 0%, transparent 50%),
        var(--color-bg);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .router {
      max-width: 920px;
      margin: 0 auto;
      padding: var(--space-8) var(--space-4);
    }
    .router-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .router-header h1 { margin: 0 0 var(--space-2); font-size: var(--font-3xl); }
    .router-header p { margin: 0; color: var(--color-text-secondary); }
    .router-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-4);
    }
    .role-card {
      display: flex; flex-direction: column;
      padding: var(--space-6);
      background: var(--color-bg-elevated);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all var(--duration-base) var(--ease-out);
      animation: fadeInUp var(--duration-slow) var(--ease-out);
    }
    .role-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--color-primary);
    }
    .role-card .icon {
      width: 64px; height: 64px;
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: #fff;
      margin-bottom: var(--space-3);
    }
    .role-card.cust .icon { background: linear-gradient(135deg, var(--color-primary) 0%, #4096ff 100%); }
    .role-card.agt .icon { background: linear-gradient(135deg, var(--color-success) 0%, #95de64 100%); }
    .role-card.adm .icon { background: linear-gradient(135deg, #722ed1 0%, #a855f7 100%); }
    .role-card .title { font-size: var(--font-lg); font-weight: var(--font-semibold); margin-bottom: var(--space-1); }
    .role-card .desc { font-size: var(--font-sm); color: var(--color-text-secondary); }
    .role-card .meta {
      display: flex; align-items: center; gap: var(--space-2);
      margin-top: var(--space-3);
      font-size: var(--font-xs);
      color: var(--color-text-tertiary);
    }
    .role-card .meta .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-text-tertiary);
    }
    .role-card.online .meta .dot { background: var(--color-success); }
  </style>
</head>
<body>
<div class="router">
  <div class="router-header">
    <h1>🛎️ 在线客服系统</h1>
    <p>选择角色进入对应工作台</p>
  </div>

  <div class="router-grid" id="grid">
    <div class="role-card cust" data-role="customer">
      <div class="icon">🧑</div>
      <div class="title">客户咨询</div>
      <div class="desc">智能客服 + 人工坐席<br>账单 / 产品 / 交易</div>
      <div class="meta"><span class="dot"></span><span>智能客服 · 在线</span></div>
    </div>
    <div class="role-card agt" data-role="agent">
      <div class="icon">👨‍💼</div>
      <div class="title">坐席工作台</div>
      <div class="desc">排队接听 / 富文本聊天<br>快捷回复 / 反应 / 撤回</div>
      <div class="meta"><span class="dot"></span><span>企微登录</span></div>
    </div>
    <div class="role-card adm" data-role="admin">
      <div class="icon">🛡️</div>
      <div class="title">后管系统</div>
      <div class="desc">会话审核 / 强制挂断<br>审计日志 / 数据看板</div>
      <div class="meta"><span class="dot"></span><span>admin / admin</span></div>
    </div>
  </div>
</div>

<script>
  // 一件部署：根据 ?role= 自动跳转到对应页面
  (function() {
    const params = new URLSearchParams(location.search);
    const role = params.get('role');
    const token = params.get('token') || localStorage.getItem('cs_token') || '';
    if (token) localStorage.setItem('cs_token', token);

    const pathMap = { customer: '/customer/', agent: '/agent/', admin: '/admin/' };
    if (role && pathMap[role]) {
      const qs = token ? '?token=' + encodeURIComponent(token) : '';
      location.replace(pathMap[role] + qs);
      return;
    }

    // 否则让用户点击卡片
    document.querySelectorAll('.role-card').forEach(card => {
      card.addEventListener('click', () => {
        const r = card.dataset.role;
        const qs = token ? '?token=' + encodeURIComponent(token) : '';
        // 检查 token，没有则先跳登录
        if (!token && r !== 'admin') {
          location.href = '/login/?next=' + r;
        } else {
          location.href = pathMap[r] + qs;
        }
      });
    });
  })();
</script>
</body>
</html>
