<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>在线客服系统</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; padding: 40px 50px; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.06); text-align: center; }
    h1 { margin: 0 0 12px; }
    p { color: #666; margin: 0 0 24px; }
    a { display: inline-block; padding: 12px 28px; margin: 6px; background: #1677ff; color: #fff; text-decoration: none; border-radius: 8px; }
    a.gray { background: #555; }
    a.admin { background: #722ed1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛎️ 在线客服系统</h1>
    <p>Spring Cloud + Vue 3 + 公众号 OAuth + 企业微信 OAuth</p>
    <a href="/customer/">客户咨询</a>
    <a class="gray" href="/agent/">坐席工作台</a>
    <a class="admin" href="/admin/">后管系统</a>
  </div>
</body>
</html>
