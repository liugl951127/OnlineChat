<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 · 在线客服</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/shared/design-system.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(22,119,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(114,46,209,0.12) 0%, transparent 50%),
        var(--color-bg);
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-4);
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .login-card {
      width: 100%; max-width: 440px;
      background: var(--color-bg-elevated);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      overflow: hidden;
      animation: fadeInUp var(--duration-slow) var(--ease-out);
    }
    .login-header {
      padding: var(--space-6) var(--space-6) var(--space-4);
      text-align: center;
      background: linear-gradient(135deg, var(--color-primary) 0%, #722ed1 100%);
      color: var(--color-text-inverse);
    }
    .login-header .logo {
      width: 64px; height: 64px;
      margin: 0 auto var(--space-3);
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      backdrop-filter: blur(8px);
    }
    .login-header h1 { margin: 0 0 4px; font-size: var(--font-2xl); font-weight: var(--font-semibold); }
    .login-header .subtitle { margin: 0; font-size: var(--font-sm); opacity: 0.9; }

    .login-tabs {
      display: flex;
      padding: var(--space-4) var(--space-5) 0;
      gap: var(--space-1);
      border-bottom: 1px solid var(--color-divider);
    }
    .login-tab {
      flex: 1;
      padding: var(--space-3);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: var(--font-base);
      color: var(--color-text-secondary);
      transition: all var(--duration-fast) var(--ease-out);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .login-tab:hover { color: var(--color-text); }
    .login-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
      font-weight: var(--font-semibold);
    }
    .login-body { padding: var(--space-6); }

    .form-group { margin-bottom: var(--space-4); }
    .form-label {
      display: block;
      font-size: var(--font-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-1);
      font-weight: var(--font-medium);
    }
    .input-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .input-wrap .input-icon {
      position: absolute;
      left: 12px;
      font-size: 16px;
      color: var(--color-text-tertiary);
      pointer-events: none;
    }
    .input-wrap .input {
      padding-left: 38px;
    }
    .code-btn {
      position: absolute;
      right: 4px;
      top: 4px;
      bottom: 4px;
      padding: 0 12px;
      background: var(--color-primary-light);
      color: var(--color-primary);
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--font-sm);
      cursor: pointer;
      font-weight: var(--font-medium);
      transition: all var(--duration-fast) var(--ease-out);
    }
    .code-btn:hover:not(:disabled) { background: var(--color-primary); color: #fff; }
    .code-btn:disabled { background: var(--color-bg-hover); color: var(--color-text-tertiary); cursor: not-allowed; }
    .input-with-code { padding-right: 110px; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      font-size: var(--font-lg);
      font-weight: var(--font-semibold);
      background: linear-gradient(135deg, var(--color-primary) 0%, #722ed1 100%);
      color: var(--color-text-inverse);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      box-shadow: 0 4px 12px rgba(22,119,255,0.25);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(22,119,255,0.35); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .alt-actions {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: var(--space-4);
      font-size: var(--font-sm);
    }
    .alt-actions a {
      color: var(--color-primary);
      cursor: pointer;
      text-decoration: none;
    }
    .alt-actions a:hover { text-decoration: underline; }

    .divider {
      display: flex; align-items: center;
      margin: var(--space-5) 0;
      color: var(--color-text-tertiary);
      font-size: var(--font-xs);
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--color-divider);
    }
    .divider span { padding: 0 var(--space-3); }

    .social-row {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3);
    }
    .social-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: var(--font-sm);
      color: var(--color-text);
      transition: all var(--duration-fast) var(--ease-out);
    }
    .social-btn:hover { background: var(--color-bg-elevated); border-color: var(--color-primary); }

    .footer-text {
      text-align: center;
      padding: var(--space-3);
      font-size: var(--font-xs);
      color: var(--color-text-tertiary);
      border-top: 1px solid var(--color-divider);
      background: var(--color-bg);
    }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      padding: var(--space-2) var(--space-4);
      background: rgba(0,0,0,0.85);
      color: #fff;
      border-radius: var(--radius-md);
      font-size: var(--font-sm);
      z-index: var(--z-toast);
      animation: fadeInUp var(--duration-base) var(--ease-out);
    }
  </style>
</head>
<body>
<div id="app">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">💬</div>
      <h1>智能客服系统</h1>
      <p class="subtitle">Spring Cloud + 公众号 + 企微</p>
    </div>

    <div class="login-tabs">
      <button class="login-tab" :class="{ active: tab==='password' }" @click="tab='password'">
        <span>🔑</span><span>账号密码</span>
      </button>
      <button class="login-tab" :class="{ active: tab==='phone' }" @click="tab='phone'">
        <span>📱</span><span>手机号</span>
      </button>
      <button class="login-tab" :class="{ active: tab==='silent' }" @click="tab='silent'">
        <span>👤</span><span>访客</span>
      </button>
    </div>

    <div class="login-body">
      <!-- 账号密码 -->
      <div v-if="tab==='password'">
        <div v-if="!registerMode">
          <div class="form-group">
            <label class="form-label">用户名</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input class="input" v-model="form.username" placeholder="请输入用户名" autocomplete="username">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input class="input" :type="showPwd ? 'text' : 'password'" v-model="form.password" placeholder="请输入密码" @keyup.enter="doLogin" autocomplete="current-password">
              <button @click="showPwd=!showPwd" style="position:absolute;right:10px;background:transparent;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:14px;">{{ showPwd ? '🙈' : '👁' }}</button>
            </div>
          </div>
          <button class="btn-primary" @click="doLogin" :disabled="loading">{{ loading ? '登录中...' : '登 录' }}</button>
          <div class="alt-actions">
            <a @click="registerMode=true">没有账号？立即注册</a>
            <a @click="forgotPwd">忘记密码？</a>
          </div>
        </div>

        <div v-else>
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input class="input" v-model="form.username" placeholder="3-32 位，支持字母数字_-@.">
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input class="input" type="password" v-model="form.password" placeholder="至少 6 位">
          </div>
          <div class="form-group">
            <label class="form-label">手机号（可选，绑定后可手机号登录）</label>
            <input class="input" v-model="form.phone" placeholder="11 位手机号">
          </div>
          <div class="form-group" v-if="form.phone">
            <label class="form-label">验证码</label>
            <div class="input-wrap">
              <input class="input input-with-code" v-model="form.code" placeholder="6 位验证码">
              <button class="code-btn" @click="sendCode('register')" :disabled="codeCooldown > 0">{{ codeCooldown > 0 ? codeCooldown + 's' : '获取验证码' }}</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">昵称（可选）</label>
            <input class="input" v-model="form.nickname" placeholder="留空则用用户名">
          </div>
          <button class="btn-primary" @click="doRegister" :disabled="loading">{{ loading ? '注册中...' : '注 册' }}</button>
          <div class="alt-actions">
            <a @click="registerMode=false">已有账号？返回登录</a>
          </div>
        </div>
      </div>

      <!-- 手机号登录 -->
      <div v-if="tab==='phone'">
        <div class="form-group">
          <label class="form-label">手机号</label>
          <div class="input-wrap">
            <span class="input-icon">📱</span>
            <input class="input input-with-code" v-model="phoneForm.phone" placeholder="11 位手机号" maxlength="11">
            <button class="code-btn" @click="sendCode('login')" :disabled="codeCooldown > 0 || !validPhone">{{ codeCooldown > 0 ? codeCooldown + 's' : '获取验证码' }}</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">验证码</label>
          <input class="input" v-model="phoneForm.code" placeholder="6 位验证码" maxlength="6" @keyup.enter="doPhoneLogin">
        </div>
        <button class="btn-primary" @click="doPhoneLogin" :disabled="loading">{{ loading ? '登录中...' : '登 录' }}</button>
        <p style="font-size: var(--font-xs); color: var(--color-text-tertiary); margin-top: var(--space-3);">
          📌 新手机号将自动创建账号
        </p>
      </div>

      <!-- 访客登录 -->
      <div v-if="tab==='silent'">
        <p style="color: var(--color-text-secondary); text-align: center; margin: var(--space-6) 0;">
          快速体验，无需注册
        </p>
        <button class="btn-primary" @click="doSilent" :disabled="loading">
          {{ loading ? '进入中...' : '以访客身份进入' }}
        </button>
      </div>

      <div class="divider"><span>其他登录方式</span></div>
      <div class="social-row">
        <button class="social-btn" @click="oaLogin">💚 公众号</button>
        <button class="social-btn" @click="workLogin">💼 企业微信</button>
      </div>
    </div>

    <div class="footer-text">登录即表示同意《用户协议》《隐私政策》</div>
  </div>

  <div v-if="toast" class="toast">{{ toast }}</div>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;

createApp({
  setup() {
    const tab = ref('phone');
    const registerMode = ref(false);
    const showPwd = ref(false);
    const loading = ref(false);
    const toast = ref('');
    const codeCooldown = ref(0);
    let toastTimer = null;

    const form = reactive({ username: '', password: '', phone: '', code: '', nickname: '' });
    const phoneForm = reactive({ phone: '', code: '' });

    const validPhone = computed(() => /^1[3-9]\d{9}$/.test(phoneForm.phone));

    function showToast(t) {
      toast.value = t;
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.value = '', 3000);
    }

    async function doLogin() {
      if (!form.username || !form.password) return showToast('请输入用户名和密码');
      loading.value = true;
      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: form.username, password: form.password })
        });
        const d = await r.json();
        if (d.code) return showToast(d.msg || '登录失败');
        onLoginSuccess(d.data);
      } catch (e) {
        showToast('网络错误');
      } finally {
        loading.value = false;
      }
    }

    async function doRegister() {
      if (!form.username || !form.password) return showToast('请填写完整');
      if (form.password.length < 6) return showToast('密码至少 6 位');
      if (form.phone && !form.code) return showToast('请填写手机验证码');
      loading.value = true;
      try {
        const r = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(form)
        });
        const d = await r.json();
        if (d.code) return showToast(d.msg || '注册失败');
        showToast('注册成功！正在登录...');
        setTimeout(() => onLoginSuccess(d.data), 800);
      } catch (e) {
        showToast('网络错误');
      } finally {
        loading.value = false;
      }
    }

    async function doPhoneLogin() {
      if (!validPhone.value) return showToast('手机号格式错误');
      if (!phoneForm.code) return showToast('请输入验证码');
      loading.value = true;
      try {
        const r = await fetch('/auth/login-phone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(phoneForm)
        });
        const d = await r.json();
        if (d.code) return showToast(d.msg || '登录失败');
        onLoginSuccess(d.data);
      } catch (e) {
        showToast('网络错误');
      } finally {
        loading.value = false;
      }
    }

    async function doSilent() {
      loading.value = true;
      try {
        const r = await fetch('/auth/silent-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tempCode: 'auto-' + Date.now() })
        });
        const d = await r.json();
        if (d.code) return showToast('登录失败');
        onLoginSuccess(d.data);
      } finally {
        loading.value = false;
      }
    }

    function onLoginSuccess(data) {
      const token = data.token;
      // 根据返回的 role 跳转（这里简化：都跳客户页）
      const role = data.role || 'CUSTOMER';
      const url = role === 'AGENT' ? '/agent/?token=' + token : '/customer/?token=' + token;
      location.href = url;
    }

    async function sendCode(mode) {
      const phone = mode === 'login' ? phoneForm.phone : form.phone;
      if (!/^1[3-9]\d{9}$/.test(phone)) return showToast('手机号格式错误');
      try {
        const r = await fetch('/auth/sms/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const d = await r.json();
        if (d.code) return showToast(d.msg || '发送失败');
        showToast('验证码已发送' + (d.data?.debugCode ? '（' + d.data.debugCode + '）' : ''));
        codeCooldown.value = 60;
        const timer = setInterval(() => {
          codeCooldown.value--;
          if (codeCooldown.value <= 0) clearInterval(timer);
        }, 1000);
      } catch (e) {
        showToast('网络错误');
      }
    }

    function oaLogin() {
      location.href = '/auth/wechat-oa/authorize?redirect_uri=' + encodeURIComponent(location.origin + '/login/');
    }
    function workLogin() {
      location.href = '/auth/wechat-work/authorize?redirect_uri=' + encodeURIComponent(location.origin + '/agent/');
    }
    function forgotPwd() { showToast('请联系管理员重置（admin/admin）'); }

    onMounted(() => {
      const params = new URLSearchParams(location.search);
      if (params.get('register')) { registerMode.value = true; tab.value = 'password'; }
    });

    return {
      tab, registerMode, showPwd, loading, toast, codeCooldown,
      form, phoneForm, validPhone,
      doLogin, doRegister, doPhoneLogin, doSilent, sendCode,
      oaLogin, workLogin, forgotPwd
    };
  }
}).mount('#app');
</script>
</body>
</html>
