spring:
  application:
    name: cs-gateway
  cloud:
    nacos:
      # v2.2.44: bootstrap 优先于 application.yml 加载
      # 这样 nacos config 能覆盖本地 application.yml
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        # 注册失败不阻塞启动（沙箱演示模式）
        fail-fast: false
        # 心跳间隔 5s，超时 15s 剔除
        heartbeat-interval: 5000
        heart-beat-timeout: 15000
      config:
        enabled: ${NACOS_CONFIG_ENABLED:false}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:public}
        # 启动时允许 nacos 不可达（沙箱 fallback 到本地配置）
        fail-fast: false