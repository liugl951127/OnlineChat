server:
  port: 9000

spring:
  application:
    name: cs-gateway
  profiles:
    active: prod
  main:
    # cs-gateway 用 spring-cloud-starter-gateway（WebFlux 响应式）
    # cs-common 传递依赖 spring-boot-starter-web，需明确指定为 reactive 避免冲突
    web-application-type: reactive
  # nacos 配置在 bootstrap.yml 加载 (v2.2.44)
  cloud:
    gateway:
      # v2.2.45: 路由硬编码 http://localhost: 直连，不受 nacos/环境变量影响
      #  所有服务同时通过 @EnableDiscoveryClient + nacos-discovery 注册到 nacos
      #  用于服务发现 / 健康监控 / OpenAPI 发现, 但 gateway 转发仍走直连
      routes:
        - id: cs-auth
          uri: http://localhost:9001
          predicates:
            - Path=/auth/**,/auth/actuator/**,/api/auth/**
        - id: cs-robot
          uri: http://localhost:9002
          predicates:
            - Path=/robot/**
        - id: cs-im
          uri: http://localhost:9003
          predicates:
            - Path=/im/**,/ws/**,/api/im/**,/api/ws/**
        - id: cs-trade
          uri: http://localhost:9004
          predicates:
            - Path=/trade/**
        - id: cs-message
          uri: http://localhost:9005
          predicates:
            - Path=/message/**,/api/message/**
        # Actuator 健康检查路径转发（供 K8s liveness/readiness 探针 + Prometheus 抓取）
        - id: auth-health
          uri: http://localhost:9001
          predicates:
            - Path=/actuator/auth/**
          filters:
            - StripPrefix=1
        - id: im-health
          uri: http://localhost:9003
          predicates:
            - Path=/actuator/im/**
          filters:
            - StripPrefix=1
        - id: message-health
          uri: http://localhost:9005
          predicates:
            - Path=/actuator/message/**,/message/actuator/**
          filters:
            - StripPrefix=1

cs:
  jwt:
    secret: ZLmASTkUGsHRGeHW8i3-Fk1Hw39lEHIK
    ttl-ms: 86400000

logging:
  level:
    org.springframework.cloud.gateway: INFO

# Gateway 自身健康检查（供 K8s liveness 探针）
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,gatewayroutes
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true