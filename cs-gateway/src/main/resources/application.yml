server:
  port: 9000

spring:
  application:
    name: cs-gateway
  profiles:
    active: prod
  main:
    # cs-gateway 用 spring-cloud-starter-gateway（WebFlux 响应式）
    # cs-common 传递依赖 spring-boot-starter-web，需明确指定为 reactive 避免冲突
    web-application-type: reactive
  # v2.2.64: Nacos 配置导入（optional 表示配置不存在时不报错）
  # Spring Cloud Alibaba 自动识别 optional:nacos: 前缀, 拉远程配置
  # Data ID 必须是完整 .yaml 后缀:
  #   cs-gateway-prod.yaml
  #   cs-gateway.yaml (基础配置,可选)
  config:
    import: "optional:nacos:cs-gateway-prod.yaml"
  cloud:
    # v2.2.80: LoadBalancer 服务实例缓存 (避免每次请求查 nacos)
    # 需引入 spring-cloud-starter-loadbalancer + caffeine 依赖
    # 启用了 spring-cloud-loadbalancer-cache 自动配置 (CaffeineBasedLoadBalancerCacheManager)
    loadbalancer:
      cache:
        enabled: true
        # 30 秒后强制刷新服务列表
        ttl: 30s
        # 最多缓存 100 个服务
        capacity: 100
        # Caffeine 完整 spec (覆盖 ttl/capacity)
        caffeine:
          spec: expireAfterWrite=30s,maximumSize=100,recordStats
    nacos:
      discovery:
        # 默认启用注册: 服务向 nacos 自动注册 (v2.2.47)
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        # v2.2.59: nacos 鉴权 (默认 nacos/nacos, 生产改 ${NACOS_USER}:${NACOS_PASSWORD})
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        register-enabled: true
        # 心跳 5s, 超时 15s 剔除
        heartbeat-interval: 5000
        heart-beat-timeout: 15000
      # v2.2.64: Nacos 配置中心 (供 spring.config.import 用)
      # spring.config.import: optional:nacos:cs-gateway-prod.yaml 会自动加载
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml
    gateway:
      # v2.2.47: 路由用 lb://cs-auth (通过 nacos 服务发现负载均衡)
      # 沙箱 nacos 不可达时，gateway 会 fallback 报错但仍能启动
      routes:
        - id: cs-auth
          uri: lb://cs-auth
          predicates:
            - Path=/auth/**,/auth/actuator/**
        # v2.2.85: /api/auth/** StripPrefix=1
        - id: cs-auth-api
          uri: lb://cs-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: cs-robot
          uri: lb://cs-robot
          predicates:
            - Path=/robot/**
        - id: cs-im
          uri: lb://cs-im
          predicates:
            - Path=/im/**,/ws/**
        # v2.2.85: /api/im/** StripPrefix=1
        - id: cs-im-api
          uri: lb://cs-im
          predicates:
            - Path=/api/im/**,/api/ws/**
          filters:
            - StripPrefix=1
        - id: cs-trade
          uri: lb://cs-trade
          predicates:
            - Path=/trade/**
        - id: cs-message
          uri: lb://cs-message
          predicates:
            - Path=/message/**
        - id: cs-message-api
          uri: lb://cs-message
          predicates:
            - Path=/api/message/**
          filters:
            - StripPrefix=1
        # Actuator 健康检查路径转发（供 K8s liveness/readiness 探针 + Prometheus 抓取）
        - id: auth-health
          uri: lb://cs-auth
          predicates:
            - Path=/actuator/auth/**
          filters:
            - StripPrefix=1
        - id: im-health
          uri: lb://cs-im
          predicates:
            - Path=/actuator/im/**
          filters:
            - StripPrefix=1
        - id: message-health
          uri: lb://cs-message
          predicates:
            - Path=/actuator/message/**,/message/actuator/**
          filters:
            - StripPrefix=1
      # 启用 gateway 服务发现 locator (自动将 /serviceId/** 路由)
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

cs:
  # v2.2.85: 静态服务发现 fallback (无 nacos 时 lb:// 仍能路由)
  # v2.2.85: 静态服务发现 fallback
  static-discovery:
    enabled: ${STATIC_DISCOVERY_ENABLED:false}
    services:
      cs-auth:    ${CS_AUTH_ADDR:127.0.0.1:9001}
      cs-im:      ${CS_IM_ADDR:127.0.0.1:9003}
      cs-message: ${CS_MESSAGE_ADDR:127.0.0.1:9005}
      cs-robot:   ${CS_ROBOT_ADDR:127.0.0.1:9006}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    # v2.2.46: nacos discovery 详细日志
    com.alibaba.cloud.nacos: DEBUG
    com.alibaba.nacos: DEBUG

# Gateway 自身健康检查（供 K8s liveness 探针）
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,gatewayroutes,refresh
  # v2.2.46: NacosDiagnosticsController 自定义 /actuator/nacos-diagnostics 端点
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true