server:
  port: 9000

spring:
  application:
    name: cs-gateway
  profiles:
    active: prod
  main:
    # cs-gateway 用 spring-cloud-starter-gateway（WebFlux 响应式）
    # cs-common 传递依赖 spring-boot-starter-web，需明确指定为 reactive 避免冲突
    web-application-type: reactive
  # v2.2.50: spring.config.import 简写格式
  # Spring Cloud Alibaba nacos-config 支持省略 .yaml 后缀
  # 可用以下任一格式 (按推荐顺序):
  #   1. "optional:nacos:cs-gateway"           - 自动匹配 .yaml/.yml/.properties
  #   2. "optional:nacos:cs-gateway.yaml"     - 明确指定 yaml
  #   3. "nacos:cs-gateway?group=DEFAULT_GROUP" - 完整格式
  # 注: 不能省略 nacos: 前缀 (Spring Cloud 不识别)
  config:
    import:
      # - "optional:nacos:cs-gateway"   # 基础配置 (v2.2.50 注释，仅用 profile 版本)
      - "optional:nacos:cs-gateway-${spring.profiles.active}"
  # nacos 服务发现: 注册到 nacos
  cloud:
    nacos:
      discovery:
        # 默认启用注册: 服务向 nacos 自动注册 (v2.2.47)
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        register-enabled: true
        # 心跳 5s, 超时 15s 剔除
        heartbeat-interval: 5000
        heart-beat-timeout: 15000
      # nacos config: 通过 spring.config.import 已配置
    gateway:
      # v2.2.47: 路由用 lb://cs-auth (通过 nacos 服务发现负载均衡)
      # 沙箱 nacos 不可达时，gateway 会 fallback 报错但仍能启动
      routes:
        - id: cs-auth
          uri: lb://cs-auth
          predicates:
            - Path=/auth/**,/auth/actuator/**,/api/auth/**
        - id: cs-robot
          uri: lb://cs-robot
          predicates:
            - Path=/robot/**
        - id: cs-im
          uri: lb://cs-im
          predicates:
            - Path=/im/**,/ws/**,/api/im/**,/api/ws/**
        - id: cs-trade
          uri: lb://cs-trade
          predicates:
            - Path=/trade/**
        - id: cs-message
          uri: lb://cs-message
          predicates:
            - Path=/message/**,/api/message/**
        # Actuator 健康检查路径转发（供 K8s liveness/readiness 探针 + Prometheus 抓取）
        - id: auth-health
          uri: lb://cs-auth
          predicates:
            - Path=/actuator/auth/**
          filters:
            - StripPrefix=1
        - id: im-health
          uri: lb://cs-im
          predicates:
            - Path=/actuator/im/**
          filters:
            - StripPrefix=1
        - id: message-health
          uri: lb://cs-message
          predicates:
            - Path=/actuator/message/**,/message/actuator/**
          filters:
            - StripPrefix=1
      # 启用 gateway 服务发现 locator (自动将 /serviceId/** 路由)
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

cs:
  jwt:
    secret: ZLmASTkUGsHRGeHW8i3-Fk1Hw39lEHIK
    ttl-ms: 86400000

logging:
  level:
    org.springframework.cloud.gateway: INFO
    # v2.2.46: nacos discovery 详细日志
    com.alibaba.cloud.nacos: DEBUG
    com.alibaba.nacos: DEBUG

# Gateway 自身健康检查（供 K8s liveness 探针）
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,gatewayroutes,refresh
  # v2.2.46: NacosDiagnosticsController 自定义 /actuator/nacos-diagnostics 端点
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true