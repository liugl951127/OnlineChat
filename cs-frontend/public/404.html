<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>404 - 页面未找到</title>

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fa;
      color: #303133;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .box { text-align: center; }

<body>
  <div class="box">
    <div class="code">404</div>

</html>
