server:
  port: 9005

spring:
  application:
    name: cs-message
  profiles:
    active: prod
  # v2.2.63: 不使用 spring.config.import (避免空值报错)
  #  Spring Cloud Alibaba nacos-config 通过 spring.cloud.nacos.config 自动拉取配置
  #  Data ID 规则: ${spring.application.name}-${spring.profiles.active}.${file-extension}
  #  示例: cs-message + prod + yaml → cs-message-prod.yaml
  #  启动时不需要显式 spring.config.import
  # nacos 服务发现: 注册到 nacos
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        # v2.2.59: nacos 鉴权 (默认 nacos/nacos, 生产改 ${NACOS_USER}:${NACOS_PASSWORD})
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        register-enabled: true
        heartbeat-interval: 5000
        heart-beat-timeout: 15000
      # v2.2.60: nacos-config 属性配置 (代替 spring.config.import)
      # 自动拉取 cs-message-{spring.profiles.active}.yaml
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml

  # Redis（在线状态 + 离线消息）
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 2

  # MySQL / Druid（消息持久化）
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cs_message}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 50
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      filters: stat,wall,slf4j

  # Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:127.0.0.1:9092}
    consumer:
      group-id: cs-message-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.common.kafka,com.example.message.model
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.example.common.kafka.ChatMessageEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

cs:
  offline:
    max-messages: 100
    ttl-days: 7

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.example.message: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: INFO

# Actuator (Spring Boot 3 默认不暴露任何端点)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true