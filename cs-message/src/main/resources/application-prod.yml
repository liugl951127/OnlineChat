# cs-message 生产配置（prod profile）

server:
  port: 9005
  tomcat:
    max-threads: 200

spring:
  application:
    name: cs-message
  # v2.2.70: prod profile 必须显式声明 spring.config.import
  config:
    import: "optional:nacos:cs-message-prod.yaml"
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        register-enabled: true
        heartbeat-interval: 5000
        heart-beat-timeout: 15000
      config:
        enabled: ${NACOS_CONFIG_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:cs_message}?useUnicode=true&characterEncoding=utf8&useSSL=${DB_USE_SSL:true}&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:951127}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 50

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
      lettuce:
        pool:
          max-active: 100
          max-idle: 30

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:127.0.0.1:9092}
    consumer:
      group-id: cs-message-group
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3

cs:
  offline:
    max-messages: 100
    ttl-days: 7

logging:
  level:
    root: INFO
    com.example.message: INFO
    org.apache.kafka: WARN
  path: ${LOG_PATH:/var/log/onlinechat}
  config: classpath:logback-spring.xml

info:
  app:
    name: cs-message
    version: 1.7.1
    profile: prod
