# OnlineChat Nginx 配置示例
#
# 部署位置: /etc/nginx/conf.d/onlinechat.conf
# 测试配置: nginx -t
# 重载:     nginx -s reload
#
# 后端服务（开发端口）：
#   - cs-gateway:  127.0.0.1:9000
#   - cs-auth:     127.0.0.1:9001
#   - cs-im:       127.0.0.1:9003
#   - cs-message:  127.0.0.1:9005
#
# 前端 dist:    /opt/onlinechat/cs-frontend/dist

upstream cs_gateway {
    server 127.0.0.1:9000;
    keepalive 32;
}

upstream cs_auth {
    server 127.0.0.1:9001;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com;

    # HTTPS（生产强烈推荐）
    listen 443 ssl http2;
    ssl_certificate     /etc/nginx/ssl/yourdomain.crt;
    ssl_certificate_key /etc/nginx/ssl/yourdomain.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志
    access_log /var/log/nginx/onlinechat.access.log;
    error_log  /var/log/nginx/onlinechat.error.log;

    # 安全 headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' ws: wss:;" always;

    # ========== 前端静态资源 ==========
    location / {
        root /opt/onlinechat/cs-frontend/dist;
        try_files $uri $uri/ /index.html;   # SPA fallback 避免重定向循环
        index index.html;
        expires 1h;
    }

    # ========== 静态资源（manifest, sw, config 等） ==========
    location = /config.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; }
    location = /env.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; }
    location = /aws-config.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; }
    location = /manifest.webmanifest { root /opt/onlinechat/cs-frontend/dist; expires 30d; }
    location = /sw.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; }

    # ========== 后端 API 转发（经 Gateway） ==========
    location /api/ {
        proxy_pass http://cs_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ========== Gateway 直连（OAuth / WeChat OAuth） ==========
    location /auth/ {
        proxy_pass http://cs_gateway;       # 经 gateway 转发
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== K8s 健康检查 ==========
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ========== WebSocket ==========
    location /ws/ {
        proxy_pass http://cs_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ========== 错误页面 ==========
    # 自定义 404 页面避免 nginx 默认页面引用 nginx-logo.png / poweredby.png
    error_page 404 /404.html;
    location = /404.html {
        root /opt/onlinechat/cs-frontend/dist;
        internal;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /opt/onlinechat/cs-frontend/dist;
        internal;
    }

    # ========== 常见缺失资源静默处理 ==========
    # nginx-logo.png / poweredby.png 是 nginx 默认 404 页面引用的图标，
    # 返回 204 让浏览器静默处理，避免 error_log 噪声
    location = /nginx-logo.png { access_log off; log_not_found off; return 204; }
    location = /poweredby.png { access_log off; log_not_found off; return 204; }
    location = /favicon.ico {
        root /opt/onlinechat/cs-frontend/dist;
        expires 30d;
        log_not_found off;
        access_log off;
    }

    # ========== 健康检查（K8s） ==========
    location = /actuator/health {
        proxy_pass http://cs_gateway/actuator/health;
        access_log off;
    }
}