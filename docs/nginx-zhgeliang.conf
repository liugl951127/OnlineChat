# =====================================================
# OnlineChat Nginx 配置 - zhgeliang.com 域名
# =====================================================
#
# 部署步骤:
#   1. 域名 DNS 解析 zhgeliang.com → 服务器公网 IP
#   2. 服务器防火墙放行 80/443 端口
#   3. 申请 SSL 证书 (Let's Encrypt 推荐)
#      sudo certbot certonly --nginx -d zhgeliang.com -d www.zhgeliang.com
#   4. 复制本文件: sudo cp docs/nginx-zhgeliang.conf /etc/nginx/conf.d/zhgeliang.conf
#   5. 测试配置: sudo nginx -t
#   6. 重载: sudo nginx -s reload
#
# 后端服务:
#   - cs-gateway:  127.0.0.1:9000
#   - cs-im:       127.0.0.1:9001
#   - cs-auth:     127.0.0.1:9003
#   - cs-message:  127.0.0.1:9004
#
# 前端 dist:    /opt/onlinechat/cs-frontend/dist
#
# =====================================================

# ============ Upstream 后端集群 ============
upstream oc_gateway {
    server 127.0.0.1:9000;
    keepalive 32;
}

upstream oc_im {
    server 127.0.0.1:9001;
    keepalive 16;
}

upstream oc_auth {
    server 127.0.0.1:9003;
    keepalive 16;
}

upstream oc_message {
    server 127.0.0.1:9004;
    keepalive 16;
}

# ============ HTTP → HTTPS 跳转 ============
server {
    listen 80;
    listen [::]:80;
    server_name zhgeliang.com www.zhgeliang.com;

    # Let's Encrypt 验证用
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # 其他请求强制 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    access_log /var/log/nginx/zhgeliang.http.log;
}

# ============ HTTPS 主站 ============
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name zhgeliang.com www.zhgeliang.com;

    # ---- SSL 证书 (Let's Encrypt) ----
    ssl_certificate     /etc/letsencrypt/live/zhgeliang.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhgeliang.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/zhgeliang.com/chain.pem;

    # ---- SSL 协议优化 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;  # TLSv1.3 让客户端优先
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---- 日志 ----
    access_log /var/log/nginx/zhgeliang.https.access.log;
    error_log  /var/log/nginx/zhgeliang.https.error.log;

    # ---- 安全 headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: 允许内联 (Vue dev) + 公众号图片 + 第三方 avatar (dicebear) + WebSocket
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; media-src 'self' blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-src https://open.weixin.qq.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- 客户端限制 (防滥用) ----
    client_max_body_size 50M;          # 上传截图/视频帧
    client_body_buffer_size 128k;
    client_header_timeout 30s;
    client_body_timeout 60s;

    # ============================================================
    #  前端 SPA 静态资源
    # ============================================================
    location / {
        root /opt/onlinechat/cs-frontend/dist;
        try_files $uri $uri/ /index.html;   # SPA fallback
        index index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # index.html 不缓存 (确保版本切换)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }

    # ---- 前端辅助资源 ----
    location = /config.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; add_header Cache-Control "public"; }
    location = /env.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; add_header Cache-Control "public"; }
    location = /aws-config.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; add_header Cache-Control "public"; }
    location = /manifest.webmanifest { root /opt/onlinechat/cs-frontend/dist; expires 30d; add_header Cache-Control "public, immutable"; }
    location = /sw.js { root /opt/onlinechat/cs-frontend/dist; expires 1h; }
    location = /favicon.ico { root /opt/onlinechat/cs-frontend/dist; expires 30d; access_log off; log_not_found off; }

    # ============================================================
    #  后端 API 转发
    # ============================================================

    # ---- IM 服务 (WebSocket + REST) ----
    # /im/* → cs-im (聊天/会话/消息/回溯)
    location /im/ {
        proxy_pass http://oc_im;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }

    # ---- 消息服务 (离线消息) ----
    # /message/* → cs-message
    location /message/ {
        proxy_pass http://oc_message;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ---- 认证服务 (OAuth / 登录 / 公众号) ----
    # /auth/* → cs-auth (也可经 gateway)
    location /auth/ {
        proxy_pass http://oc_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # ---- Gateway 转发 (lb:// 路由, 旧 OAuth 流程) ----
    # 兼容旧路由 (OAuthCallback 等经 gateway)
    location /api/ {
        proxy_pass http://oc_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ============================================================
    #  WebSocket (Spring WebSocket + SockJS)
    # ============================================================
    # /ws/* → cs-gateway → cs-im (实时聊天)
    location /ws/ {
        proxy_pass http://oc_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;     # 长连接 24h
        proxy_send_timeout 86400;
    }

    # /im/ws/* → cs-im 直连 (WebSocket)
    location /im/ws/ {
        proxy_pass http://oc_im;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ============================================================
    #  静态资源 (视频/截图/上传)
    # ============================================================

    # 视频回溯 MP4 (cs-im 直存)
    location /replay/video/ {
        proxy_pass http://oc_im;
        proxy_set_header Host $host;
        proxy_buffering off;       # 视频流不缓冲
        add_header Accept-Ranges "bytes";
    }

    # 上传文件 (头像/截图/语音)
    location /upload/ {
        proxy_pass http://oc_im;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }

    # ============================================================
    #  健康检查 + 监控
    # ============================================================

    # K8s liveness/readiness
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # K8s readiness (Spring Actuator)
    location = /actuator/health {
        proxy_pass http://oc_gateway/actuator/health;
        access_log off;
    }

    # ============================================================
    #  错误页面 (用前端 dist 里的 404.html)
    # ============================================================
    error_page 404 /404.html;
    location = /404.html {
        root /opt/onlinechat/cs-frontend/dist;
        internal;
    }
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /opt/onlinechat/cs-frontend/dist;
        internal;
    }

    # nginx 默认 404 页面引用的图标 (静默)
    location = /nginx-logo.png { access_log off; log_not_found off; return 204; }
    location = /poweredby.png { access_log off; log_not_found off; return 204; }
}

# =====================================================
#  限速配置 (示例, 防爬虫/防刷)
# =====================================================
