# cs-auth nacos 远程配置示例 (v2.2.49)
# Data ID: cs-auth.yaml
# Group: DEFAULT_GROUP
# Format: YAML

cs:
  jwt:
    # 默认 24h, 生产可改为 8h
    ttl-ms: 28800000
  sms:
    # 默认 false, 生产改 true
    mock: false
    ttl-seconds: 600

oauth:
  github:
    client-id: "prod-github-client-id"
    mock: false
  google:
    client-id: "prod-google-client-id"
    mock: false

logging:
  level:
    com.example.auth: INFO
    com.example.common: WARN