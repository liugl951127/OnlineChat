# =====================================================
# cs-gateway nacos 远程配置示例 (v2.2.49)
# =====================================================
#
# 推送到 nacos 控制台的方法:
#   1. 浏览器打开 http://127.0.0.1:8848/nacos (nacos/nacos)
#   2. 配置管理 → 配置列表 → 右上角 "+" 新建配置
#   3. Data ID: cs-gateway.yaml
#   4. Group: DEFAULT_GROUP
#   5. 配置格式: YAML
#   6. 配置内容: 复制本文件全部内容
#   7. 点击 "发布"
#
# 或者用 curl API 推送:
#   curl -X POST "http://127.0.0.1:8848/nacos/v1/cs/configs" \
#     -d "dataId=cs-gateway.yaml" \
#     -d "group=DEFAULT_GROUP" \
#     -d "content=..." \
#     -d "type=yaml"
#
# 推送后应用自动拉取 (通过 spring.config.import):
#   "optional:nacos:cs-gateway.yaml"
#   "optional:nacos:cs-gateway-${spring.profiles.active}.yaml"
#
# 热更新:
#   POST http://127.0.0.1:9000/actuator/refresh
# =====================================================

# 网关欢迎语 (NacosConfigDemoController 读取)
cs:
  gateway:
    welcome: "🎉 Hello from Nacos - 配置拉取成功!"
    feature-flags:
      rate-limit-enabled: true
    blacklist-ips: "192.168.1.100,10.0.0.50"

# 路由额外配置 (可选: 覆盖本地 application.yml 的 routes)
spring:
  cloud:
    gateway:
      routes:
        - id: cs-auth-v2
          uri: lb://cs-auth
          predicates:
            - Path=/api/v2/auth/**
        - id: cs-im-v2
          uri: lb://cs-im
          predicates:
            - Path=/api/v2/im/**

# 日志级别远程调整
logging:
  level:
    com.example.gateway: INFO
    com.example.im: WARN

# JVM 参数远程调整 (需重启生效)
server:
  tomcat:
    max-threads: 500
    accept-count: 300