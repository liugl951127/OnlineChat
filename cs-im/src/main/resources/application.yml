server:
  port: 9003

spring:
  profiles:
    active: dev
  application:
    name: cs-im
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        file-extension: yaml

  # 默认 dev
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:cs_im}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 30
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      filters: stat,wall,slf4j
      stat-view-servlet:
        enabled: true
        login-username: admin
        login-password: admin123
        url-pattern: /druid/*

  flyway:
    enabled: false   # v2.2.0: cs-im 不需要 migration 校验，统一走 db_init_all.sql
    baseline-on-migrate: false
    locations: classpath:db/migration

  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    type-aliases-package: com.example.im.domain
    configuration:
      map-underscore-to-camel-case: true
      cache-enabled: false
    global-config:
      db-config:
        id-type: AUTO
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

cs:
  upload:
    dir: ./data/upload/
    url-prefix: /upload/
    max-size: 20971520

wechat:
  oa:
    app-id: demo-oa-appid
    app-secret: demo-oa-secret
    mock: false
  work:
    corp-id: demo-corp
    agent-id: demo-agent
    app-secret: demo-secret
    mock: false

logging:
  level:
    com.example.im: INFO

# LLM 配置（v2.1.0）
llm:
  provider: openai        # mock / openai / qwen / ollama
  model: gpt-3.5-turbo
  api-key: ""
  endpoint: ""
  timeout-ms: 5000
  rag-top-k: 3
  max-suggestion-length: 500

# KYC 算法服务 Mock 开关（v2.1.0）
# 生产推荐 false（对接百度/阿里云/腾讯云真实 API）
kyc:
  mock:
    ocr: false           # 身份证 OCR（百度/阿里云/腾讯云）
    liveness: false      # 活体检测（腾讯云慧眼/阿里云实人认证）
    face-match: false    # 人脸比对（百度人脸识别）
    video-record: false  # 视频双录上传（OSS）
    bank-card: false     # 银行卡四要素（银联/网联）
    risk-control: false  # 风控评估（百融/同盾）

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:im_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    type: com.zaxxer.hikari.HikariDataSource
  flyway:
    enabled: false
  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    druid:
      max-active: 100
      filters: stat,wall
      stat-view-servlet:
        enabled: false
# 百度 AI 配置（v2.1.1 OCR + 人脸）
baidu:
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:demo-ocr-appid}
    api-key: ${BAIDU_OCR_API_KEY:demo-ocr-key}
    secret-key: ${BAIDU_OCR_SECRET_KEY:demo-ocr-secret}
    endpoint: https://aip.baidubce.com/rest/2.0/ocr/v1
    timeout-ms: 5000
  face:
    app-id: ${BAIDU_FACE_APP_ID:demo-face-appid}
    api-key: ${BAIDU_FACE_API_KEY:demo-face-key}
    secret-key: ${BAIDU_FACE_SECRET_KEY:demo-face-secret}
    endpoint: https://aip.baidubce.com/rest/2.0/face/v3
    timeout-ms: 5000
    match-threshold: 80

# 腾讯云 AI 配置（v2.2.0 人脸 + 活体 + 银行卡四要素）
tencent:
  ai:
    secret-id: ${TENCENT_SECRET_ID:demo-secret-id}
    secret-key: ${TENCENT_SECRET_KEY:demo-secret-key}
    region: ap-guangzhou
    endpoint: iai.tencentcloudapi.com
  face:
    match-threshold: 80
  liveness:
    timeout-ms: 10000
  bank-card4:
    endpoint: cpdp.tencentcloudapi.com

# 本地自研 OCR + 人脸识别（v2.2.1 零外部 API）
# 推荐：高安全场景用腾讯云 / 百度；离线 demo / 内部测试用 local
local:
  ocr:
    enabled: true
    tess-data-path: classpath:tessdata/
  face:
    enabled: true
    cascade-path: classpath:haarcascades/haarcascade_frontalface.xml
    match-threshold: 80
