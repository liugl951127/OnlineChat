server:
  port: 9003

spring:
  application:
    name: cs-im
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    url: jdbc:h2:mem:im;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

cs:
  upload:
    dir: ./data/upload/
    url-prefix: /upload/
    max-size: 20971520   # 20MB

wechat:
  oa:
    app-id: demo-oa-appid
    app-secret: demo-oa-secret
    mock: true
  work:
    corp-id: demo-corp
    agent-id: demo-agent
    app-secret: demo-secret
    mock: true

logging:
  level:
    com.example.im: INFO