server:
  port: 9003

spring:
  profiles:
    active: prod
  application:
    name: cs-im
  # v2.2.64: Nacos 配置导入 (optional: 配不到不报错)
  config:
    import: "optional:nacos:cs-im-prod.yaml"
  # nacos 服务发现: 注册到 nacos
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        # v2.2.59: nacos 鉴权 (默认 nacos/nacos, 生产改 ${NACOS_USER}:${NACOS_PASSWORD})
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        register-enabled: true
        heartbeat-interval: 5000
        heart-beat-timeout: 15000
      # v2.2.64: Nacos 配置中心 (供 spring.config.import 用)
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:prod}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yaml

  # 默认 dev
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:cs_im}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:951127}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 30
      max-wait: 60000
      validation-query: SELECT 1
      test-while-idle: true
      filters: stat,wall,slf4j
      stat-view-servlet:
        enabled: true
        login-username: admin
        login-password: admin123
        url-pattern: /druid/*


  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    type-aliases-package: com.example.im.domain
    configuration:
      map-underscore-to-camel-case: true
      cache-enabled: false
    global-config:
      db-config:
        id-type: AUTO
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: 1                            # v2.3.0: 单 broker 场景 acks=1 已足够
      retries: 2                         # v2.3.0: 重试 2 次 (避免长尾)
      batch-size: 65536                  # v2.3.0: 64KB 批
      properties:
        # v2.3.0: max.block.ms=3000 (默认 60s 太长, Kafka 不可达时阻塞 HTTP)
        max.block.ms: 3000
        request.timeout.ms: 5000
        delivery.timeout.ms: 8000
        linger.ms: 20                    # v2.3.0: linger 20ms 攒批
        compression.type: lz4            # v2.3.0: LZ4 压缩
        max.in.flight.requests.per.connection: 5  # v2.3.0: 同 key 顺序保证 (idempotence=false)
        client.id: cs-im-producer-1
        spring.json.add.type.headers: false
    consumer:
      group-id: cs-im-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false         # v2.3.0: 手动 ack
      auto-offset-reset: latest
      max-poll-records: 200             # v2.3.0: 批拉 200 条
      properties:
        spring.json.trusted.packages: "*"
        # v2.3.0: CooperativeStickyAssignor (重平衡不丢, 比 RangeAssignor 更平滑)
        partition.assignment.strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
        fetch.max.wait.ms: 100
        session.timeout.ms: 15000
        heartbeat.interval.ms: 5000
    listener:
      concurrency: 3                    # v2.3.0: 3 并发
      ack-mode: manual
      missing-topics-fatal: false       # 沙箱 Kafka 不在也启动

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

cs:
  upload:
    dir: ./data/upload/
    url-prefix: /upload/
    max-size: 20971520
  replay:
    # v2.2.78: 视频回溯存储 (v2.3.1: 默认相对路径, 不需 root)
    storage-dir: ${CS_REPLAY_DIR:${user.home}/cs-data/replay}
    public-base: ${CS_REPLAY_BASE:http://127.0.0.1:9001/im/replay/video}
    framerate: 2

wechat:
  oa:
    app-id: demo-oa-appid
    app-secret: demo-oa-secret
    mock: false
  work:
    corp-id: demo-corp
    agent-id: demo-agent
    app-secret: demo-secret
    mock: false

logging:
  level:
    com.example.im: INFO

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# LLM 配置（v2.1.0）
llm:
  provider: openai        # mock / openai / qwen / ollama
  model: gpt-3.5-turbo
  api-key: ""
  endpoint: ""
  timeout-ms: 5000
  rag-top-k: 3
  max-suggestion-length: 500

# KYC 算法服务 Mock 开关（v2.1.0）
# 生产推荐 false（对接百度/阿里云/腾讯云真实 API）
kyc:
  mock:
    ocr: false           # 身份证 OCR（百度/阿里云/腾讯云）
    liveness: false      # 活体检测（腾讯云慧眼/阿里云实人认证）
    face-match: false    # 人脸比对（百度人脸识别）
    video-record: false  # 视频双录上传（OSS）
    bank-card: false     # 银行卡四要素（银联/网联）
    risk-control: false  # 风控评估（百融/同盾）

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:im_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    type: com.zaxxer.hikari.HikariDataSource
  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml

---
spring:
  config:
    import: "optional:nacos:cs-im-prod.yaml"   # v2.2.72: 多文档合并后被覆盖, 需重复声明
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    druid:
      max-active: 100
      filters: stat,wall
      stat-view-servlet:
        enabled: false
# 百度 AI 配置（v2.1.1 OCR + 人脸）
baidu:
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:demo-ocr-appid}
    api-key: ${BAIDU_OCR_API_KEY:demo-ocr-key}
    secret-key: ${BAIDU_OCR_SECRET_KEY:demo-ocr-secret}
    endpoint: https://aip.baidubce.com/rest/2.0/ocr/v1
    timeout-ms: 5000
  face:
    app-id: ${BAIDU_FACE_APP_ID:demo-face-appid}
    api-key: ${BAIDU_FACE_API_KEY:demo-face-key}
    secret-key: ${BAIDU_FACE_SECRET_KEY:demo-face-secret}
    endpoint: https://aip.baidubce.com/rest/2.0/face/v3
    timeout-ms: 5000
    match-threshold: 80

# 腾讯云 AI 配置（v2.2.0 人脸 + 活体 + 银行卡四要素）
tencent:
  ai:
    secret-id: ${TENCENT_SECRET_ID:demo-secret-id}
    secret-key: ${TENCENT_SECRET_KEY:demo-secret-key}
    region: ap-guangzhou
    endpoint: iai.tencentcloudapi.com
  face:
    match-threshold: 80
  liveness:
    timeout-ms: 10000
  bank-card4:
    endpoint: cpdp.tencentcloudapi.com

# 本地自研 OCR + 人脸识别（v2.2.1 零外部 API）
# 推荐：高安全场景用腾讯云 / 百度；离线 demo / 内部测试用 local
local:
  ocr:
    enabled: true
    tess-data-path: classpath:tessdata/
  face:
    enabled: true
    cascade-path: classpath:haarcascades/haarcascade_frontalface.xml
    match-threshold: 80

# v2.2.97: 国密 (SM2/SM4/SM3) 加密客户会话录像
# 生产私钥放 KMS / Vault, 当前支持本地 PEM 文件
cs:
  monitor:
    enabled: ${CS_MONITOR_ENABLED:false}                                       # v2.3.1: 默认关闭 (开发期), 生产开
    sm2-priv-pem-path: ${CS_MONITOR_SM2_PRIV:${user.home}/.cs/cs-monitor.priv.pem}
    storage-dir: ${CS_MONITOR_STORAGE_DIR:${user.home}/cs-data/monitor}        # v2.3.1: 用户目录优先
    segment-duration-ms: 5000        # SDK 默认每 5s 切一片
    retention-days: 180              # 等保 2.0 - PBOC 6 个月留存
    encrypt-at-rest: false           # 解密后落本地, 默认不安全, 生产建议 LUKS / KMS 包裹磁盘
