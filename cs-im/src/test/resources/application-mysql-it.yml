spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/cs_im?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
  flyway:
    enabled: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 1000
  main:
    web-application-type: servlet
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
  kafka:
    bootstrap-servers: 127.0.0.1:9092

logging:
  level:
    com.example: DEBUG
    org.hibernate.SQL: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
# 测试环境默认开 Mock，避免调真实外部 API
kyc:
  mock:
    ocr: true
    liveness: true
    face-match: true
    video-record: true
    bank-card: true
    risk-control: true

llm:
  provider: mock
  model: mock-v1
